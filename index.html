<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bhai 🎉</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
overflow:hidden;
height:100vh;
color:white;
text-align:center;
}

.container{
position:relative;
z-index:10;
padding-top:50px;
}

h1{
font-size:3rem;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{color:white;}
to{
color:gold;
text-shadow:0 0 20px gold;
}
}

#message{
max-width:700px;
margin:30px auto;
font-size:1.3rem;
padding:15px;
}

.cake{
position:relative;
width:200px;
height:140px;
margin:30px auto;
}

.bottom{
position:absolute;
bottom:0;
width:200px;
height:60px;
background:#ff8fab;
border-radius:12px;
}

.top{
position:absolute;
bottom:50px;
left:20px;
width:160px;
height:55px;
background:#ffc2d1;
border-radius:12px;
}

.candle{
position:absolute;
width:12px;
height:40px;
background:white;
left:94px;
top:-20px;
}

.flame{
position:absolute;
width:18px;
height:18px;
background:gold;
border-radius:50%;
top:-15px;
left:-3px;
animation:flicker .3s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

.balloon{
position:absolute;
bottom:-100px;
width:50px;
height:70px;
border-radius:50%;
animation:rise linear infinite;
}

@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s linear forwards;
}

@keyframes explode{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:scale(20);
opacity:0;
}
}

button{
padding:12px 24px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:gold;
}
</style>
</head>

<body>

<div id="balloons"></div>
<div id="fireworks"></div>

<div class="container">

<h1>🎉 Happy Birthday Brother 🎉</h1>

<div class="cake">
<div class="bottom"></div>
<div class="top"></div>
<div class="candle">
<div class="flame"></div>
</div>
</div>

<p id="message"></p>

<button onclick="playMusic()">🎵 Play Music</button>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const text =
"Happy Birthday Bhai! 🎂 Thank you for always supporting and guiding me. May your life be filled with happiness, success, good health and unforgettable memories. Have an amazing birthday! ❤️";

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,50);
}
}
typeWriter();

function playMusic(){
document.getElementById("music").play();
}

for(let i=0;i<30;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=`hsl(${Math.random()*360},100%,60%)`;
b.style.animationDuration=(8+Math.random()*8)+"s";
document.body.appendChild(b);
}

setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*70+"vh";
f.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(f);

setTimeout(()=>{
f.remove();
},1000);

},300);

</script>

</body>
</html>
