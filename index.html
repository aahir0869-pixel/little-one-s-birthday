body{

color:white;
text-align:center;
height:100vh;
}

.container{

}

h1{

}

@keyframes glow{

}
}

.slideshow{
width:260px;
height:260px;

border:4px solid white;
box-shadow:0 0 25px gold;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

#message{

max-width:700px;

.cake{

.layer{

.layer2{

}

.candle{
position:absolute;

height:35px;

}

.flame{
position:absolute;
width:15px;
height:15px;
background:gold;
border-radius:50%;
top:-12px;
left:-2px;
animation:flicker .3s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

.balloon{
position:absolute;
bottom:-100px;
width:50px;
height:70px;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s linear forwards;
}

@keyframes explode{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:scale(20);
opacity:0;
}
}
